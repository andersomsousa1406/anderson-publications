[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "anderson"
version = "0.1.0"
description = "Python library for structural simulation and optimization based on the CSD, CPP, MQLM, and GONM line."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.26",
  "matplotlib>=3.8",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["anderson*"]
